# This fixes issues with ssh agent forwarding.
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_CONNECTION"
set-hook -g client-attached "set-environment -g SSH_AUTH_SOCK '#{client_environ:SSH_AUTH_SOCK}'"

# Loooong scrollback-history!
set -g history-limit 100000

# That's the title of the terminal on the laptop.
set-option -g set-titles on
set-option -g set-titles-string '#{?SLURM_CLUSTER_NAME,#{SLURM_CLUSTER_NAME} ,}#H:#S.#I.#P #W #T' # window number,program name, active(or not)

# A somewhat nicer statusbar. Only guaranteed to look good when using solarized!
# Inspired by https://justin.abrah.ms/dotfiles/tmux.html
set -g status-bg black
set -g status-fg green
set -g status-left-length 15
set -g status-left ' #[fg=cyan,bright]#{?SLURM_CLUSTER_NAME,#{SLURM_CLUSTER_NAME},#H}#[fg=green]:#[fg=white]#S#[fg=green] | #[default]'
set -g status-right '| #[fg=yellow]%y-%m-%d %H:%M '
set -g status-justify centre

# | and - are pretty cool for window splitting.
bind-key | split-window -h
bind-key - split-window -v
bind-key E run-shell -b 'f=$(mktemp "${TMPDIR:-/tmp}/tmux-pane.XXXXXX"); tmux capture-pane -p -J -S - -t "#{pane_id}" | sed "s/[[:space:]]*$//" >"$f"; tmux new-window "${EDITOR:-vim} \"$f\""'

# Enable clipboard integration
set -g set-clipboard on

# Handle OSC-52 passthrough based on tmux version
%if #{>=:#{version},3.3}
    # tmux >= 3.3: explicitly allow passthrough
    set -g allow-passthrough on
%endif

# Tell tmux how to emit OSC-52, for all TERM's I commonly encounter.
set -ga terminal-overrides ",screen*:Ms=\\E]52;c;%p2%s\\7"
set -ga terminal-overrides ",tmux*:Ms=\\E]52;c;%p2%s\\7"
set -ga terminal-overrides ",xterm-kitty:Ms=\\E]52;c;%p2%s\\7"

# OSC-8 hyperlinks
set -ga terminal-features "*:hyperlinks"

# Truecolor for modern terms - doesn't hurt on screen-256color
set -ga terminal-overrides ",*:RGB"
